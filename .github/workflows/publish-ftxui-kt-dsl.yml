name: Publish ftxui-kt-dsl

on:
  push:
    tags:
      - 'ftxui-kt-dsl/v*'

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_task: publishLinuxX64PublicationToSonatype
            publish_metadata: true
          - os: macos-latest
            platform_task: publishMacosArm64PublicationToSonatype
            publish_metadata: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ftxui-kt-dsl/v}" >> $GITHUB_OUTPUT

      - name: Wait for ftxui-kt on Maven Central
        run: |
          KT_VERSION=$(grep ftxuiKtVersion gradle.properties | cut -d= -f2)
          URL="https://repo.maven.apache.org/maven2/nl/ncaj/ftxui/ftxui-kt/${KT_VERSION}/ftxui-kt-${KT_VERSION}.pom"
          echo "Polling for ftxui-kt:${KT_VERSION} at ${URL}"
          for i in $(seq 1 30); do
            if curl -sf "$URL" > /dev/null; then
              echo "ftxui-kt:${KT_VERSION} is available"
              exit 0
            fi
            echo "Attempt ${i}/30: not available yet, waiting 60s..."
            sleep 60
          done
          echo "Timed out waiting for ftxui-kt:${KT_VERSION} on Maven Central"
          exit 1

      - name: Publish platform artifact
        run: ./gradlew :ftxui-kt-dsl:${{ matrix.platform_task }} -PpublishVersion=${{ steps.version.outputs.version }}
        env:
          SONATYPE_AUTH_TOKEN: ${{ secrets.SONATYPE_AUTH_TOKEN }}
          PGP_KEY: ${{ secrets.PGP_KEY }}
          PGP_PASSWORD: ${{ secrets.PGP_PASSWORD }}

      - name: Publish multiplatform metadata
        if: matrix.publish_metadata
        run: ./gradlew :ftxui-kt-dsl:publishKotlinMultiplatformPublicationToSonatype -PpublishVersion=${{ steps.version.outputs.version }}
        env:
          SONATYPE_AUTH_TOKEN: ${{ secrets.SONATYPE_AUTH_TOKEN }}
          PGP_KEY: ${{ secrets.PGP_KEY }}
          PGP_PASSWORD: ${{ secrets.PGP_PASSWORD }}
