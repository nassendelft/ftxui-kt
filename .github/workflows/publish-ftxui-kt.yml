name: Publish ftxui-kt

on:
  push:
    tags:
      - 'ftxui-kt/v*'

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ftxui-kt/v}" >> $GITHUB_OUTPUT

      - name: Publish to Sonatype Central
        run: ./gradlew :ftxui-kt:publishAllPublicationsToSonatype -PpublishVersion=${{ steps.version.outputs.version }}
        env:
          SONATYPE_AUTH_TOKEN: ${{ secrets.SONATYPE_AUTH_TOKEN }}
          PGP_KEY: ${{ secrets.PGP_KEY }}
          PGP_PASSWORD: ${{ secrets.PGP_PASSWORD }}
